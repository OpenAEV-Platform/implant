name: 'Sync Project Status on PR Merge'
description: "On PR merge, moves the Status field (Project v2) of the linked issue(s) based on the feature-flag label present on the issue, closes the issue, adds the solved label, and sets the milestone if needed."

inputs:
  token:
    required: true
  project-owner:
    default: 'OpenAEV-Platform'
  project-number:
    default: '2'
  feature-flag-label:
    default: 'feature-flag'
  target-milestone:
    default: '0. Candidate'
  pr-number:
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Resolve PR data (title, body, linked issues)
      id: pr
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        OWNER: ${{ github.repository_owner }}
        REPO_NAME: ${{ github.event.repository.name }}
        PR_NUMBER_INPUT: ${{ inputs.pr-number }}
        PR_JSON: ${{ toJson(github.event.pull_request) }}
      run: |
        set -euo pipefail

        if [ -n "$PR_NUMBER_INPUT" ]; then
          PR_JSON=$(gh pr view "$PR_NUMBER_INPUT" --repo "$OWNER/$REPO_NAME" --json title,body)
        fi

        TITLE=$(echo "$PR_JSON" | jq -r '.title // ""')
        BODY=$(echo "$PR_JSON" | jq -r '.body // ""')

        echo "title=$TITLE" >> "$GITHUB_OUTPUT"

        FULLTEXT="$TITLE"$'\n'"$BODY"

        TITLE_REF=$(echo "$TITLE" | grep -oP '\(#\d+(?:,\s*#\d+)*\)\s*$' || true)
        TITLE_NUMS=""
        if [ -n "$TITLE_REF" ]; then
          TITLE_NUMS=$(echo "$TITLE_REF" | grep -oP '\d+')
        fi

        KEYWORD_NUMS=$(echo "$FULLTEXT" | grep -oiP '(close[sd]?|fix(es|ed)?|resolve[sd]?)\s*:?\s*#\d+' | grep -oP '\d+' || true)

        ISSUES=$(echo "$TITLE_NUMS $KEYWORD_NUMS" | tr ' ' '\n' | grep -E '^[0-9]+$' | sort -un | tr '\n' ' ' | sed 's/ $//' || true)

        echo "Detected issues: ${ISSUES:-<none>}"
        echo "issues=$ISSUES" >> "$GITHUB_OUTPUT"

    - name: Fetch Status field (project options)
      id: field
      if: steps.pr.outputs.issues != ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        PROJECT_OWNER: ${{ inputs.project-owner }}
        PROJECT_NUMBER: ${{ inputs.project-number }}
      run: |
        set -euo pipefail

        RESULT=$(gh api graphql -f query='
          query($login:String!, $number:Int!) {
            organization(login:$login) {
              projectV2(number:$number) {
                id
                field(name: "Status") {
                  ... on ProjectV2SingleSelectField { id options { id name } }
                }
              }
            }
          }' -f login="$PROJECT_OWNER" -F number="$PROJECT_NUMBER")

        PROJECT_ID=$(echo "$RESULT" | jq -r '.data.organization.projectV2.id')
        FIELD_ID=$(echo "$RESULT" | jq -r '.data.organization.projectV2.field.id')
        OPTIONS_JSON=$(echo "$RESULT" | jq -c '.data.organization.projectV2.field.options')

        echo "project-id=$PROJECT_ID" >> "$GITHUB_OUTPUT"
        echo "field-id=$FIELD_ID" >> "$GITHUB_OUTPUT"
        echo "options=$OPTIONS_JSON" >> "$GITHUB_OUTPUT"

    - name: Sync each linked issue
      if: steps.pr.outputs.issues != ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        OWNER: ${{ github.repository_owner }}
        REPO_NAME: ${{ github.event.repository.name }}
        PROJECT_OWNER: ${{ inputs.project-owner }}
        PROJECT_NUMBER: ${{ inputs.project-number }}
        FF_LABEL: ${{ inputs.feature-flag-label }}
        TARGET_MILESTONE: ${{ inputs.target-milestone }}
        ISSUES: ${{ steps.pr.outputs.issues }}
        PROJECT_ID: ${{ steps.field.outputs.project-id }}
        FIELD_ID: ${{ steps.field.outputs.field-id }}
        OPTIONS_JSON: ${{ steps.field.outputs.options }}
      run: |
        set -euo pipefail

        for ISSUE_NUM in $ISSUES; do
          echo "::group::Issue #$ISSUE_NUM"

          ITEM_RESULT=$(gh api graphql -f query='
            query($owner:String!, $repo:String!, $number:Int!) {
              repository(owner:$owner, name:$repo) {
                issue(number:$number) {
                  id
                  labels(first: 50) { nodes { name } }
                  projectItems(first: 20) {
                    nodes {
                      id
                      project {
                        number
                        owner {
                          ... on Organization { login }
                          ... on User { login }
                        }
                      }
                      fieldValueByName(name: "Status") {
                        ... on ProjectV2ItemFieldSingleSelectValue { name }
                      }
                    }
                  }
                }
              }
            }' -f owner="$OWNER" -f repo="$REPO_NAME" -F number="$ISSUE_NUM")

          ITEM_ID=$(echo "$ITEM_RESULT" | jq -r --arg po "$PROJECT_OWNER" --argjson pn "$PROJECT_NUMBER" \
            '.data.repository.issue.projectItems.nodes[] | select(.project.owner.login == $po and .project.number == $pn) | .id' | head -n1)
          CURRENT_STATUS=$(echo "$ITEM_RESULT" | jq -r --arg po "$PROJECT_OWNER" --argjson pn "$PROJECT_NUMBER" \
            '.data.repository.issue.projectItems.nodes[] | select(.project.owner.login == $po and .project.number == $pn) | .fieldValueByName.name // "null"' | head -n1)
          HAS_FF=$(echo "$ITEM_RESULT" | jq -r --arg label "$FF_LABEL" \
            '[.data.repository.issue.labels.nodes[].name] | any(. == $label)')

          if [ -z "$ITEM_ID" ] || [ "$ITEM_ID" == "null" ]; then
            echo "⚠️ Issue #$ISSUE_NUM is not in project $PROJECT_OWNER/#$PROJECT_NUMBER — skipping."
            echo "::endgroup::"
            continue
          fi

          echo "Current status: \"$CURRENT_STATUS\" | feature-flag (on the issue): $HAS_FF"

          NEW_STATUS=""
          CLOSE_ISSUE="false"
          MOVE_MILESTONE="false"

          if [ "$HAS_FF" == "true" ]; then
            if [ "$CURRENT_STATUS" == "In review" ]; then
              NEW_STATUS="Test PO main-ff"
            elif [ "$CURRENT_STATUS" == "Ready to remove FF" ]; then
              NEW_STATUS="Final product validation"
              CLOSE_ISSUE="true"
              MOVE_MILESTONE="true"
            fi
          else
            if [ "$CURRENT_STATUS" == "Ready to merge" ]; then
              NEW_STATUS="Final product validation"
              CLOSE_ISSUE="true"
              MOVE_MILESTONE="true"
            elif [ "$CURRENT_STATUS" == "In review" ]; then
              NEW_STATUS="Done"
              CLOSE_ISSUE="true"
              MOVE_MILESTONE="true"
            fi
          fi

          if [ -z "$NEW_STATUS" ]; then
            echo "ℹ️ No rule for status=\"$CURRENT_STATUS\" with feature-flag=$HAS_FF — nothing to do."
            echo "::endgroup::"
            continue
          fi

          OPTION_ID=$(echo "$OPTIONS_JSON" | jq -r --arg name "$NEW_STATUS" '.[] | select(.name == $name) | .id')
          if [ -z "$OPTION_ID" ] || [ "$OPTION_ID" == "null" ]; then
            echo "::error::Status option \"$NEW_STATUS\" not found on the Status field."
            echo "::endgroup::"
            continue
          fi

          gh api graphql -f query='
            mutation($project:ID!, $item:ID!, $field:ID!, $value:String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $project, itemId: $item, fieldId: $field,
                value: { singleSelectOptionId: $value }
              }) { projectV2Item { id } }
            }' -f project="$PROJECT_ID" -f item="$ITEM_ID" -f field="$FIELD_ID" -f value="$OPTION_ID" > /dev/null
          echo "✅ Status → \"$NEW_STATUS\""

          if [ "$CLOSE_ISSUE" == "true" ]; then
            gh issue edit "$ISSUE_NUM" --repo "$OWNER/$REPO_NAME" --add-label "solved"
            echo "✅ \"solved\" label added."
            gh issue close "$ISSUE_NUM" --repo "$OWNER/$REPO_NAME"
            echo "✅ Issue closed."
          fi

          if [ "$MOVE_MILESTONE" == "true" ]; then
            EXISTING=$(gh api --paginate "repos/$OWNER/$REPO_NAME/milestones?state=all&per_page=100" \
              | jq -rs --arg t "$TARGET_MILESTONE" 'add | .[] | select(.title == $t) | .number' | head -n1)
            if [ -z "$EXISTING" ]; then
              echo "⚠️ Milestone \"$TARGET_MILESTONE\" not found in $OWNER/$REPO_NAME — skipping milestone assignment."
            else
              gh issue edit "$ISSUE_NUM" --repo "$OWNER/$REPO_NAME" --milestone "$TARGET_MILESTONE"
              echo "✅ Milestone → \"$TARGET_MILESTONE\""
            fi
          fi

          echo "::endgroup::"
        done
