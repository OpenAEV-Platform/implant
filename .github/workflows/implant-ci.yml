name: "[Implant] CI"

on:
  push:
    branches: [main]
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Quality gates (fmt + audit).
  #
  # Single-platform fast checks. Clippy lives in its own job because
  # it needs to run per OS target to catch cfg-gated code.
  # ──────────────────────────────────────────────────────────────────
  quality:
    name: "🔍 Quality gates (fmt + audit)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-quality-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Run cargo fmt
        run: cargo fmt -- --check

      - name: Install cargo audit
        run: |
          if [ -x "$HOME/.cargo/bin/cargo-audit" ]; then
            echo "cargo-audit already installed."
          else
            cargo install cargo-audit --locked
          fi

      - name: Run cargo audit
        run: cargo audit

  # ──────────────────────────────────────────────────────────────────
  # Clippy lint per-OS. Per-OS (not per-arch) is required because the
  # implant has cfg(target_os=...) code paths the lint must validate
  # on each platform. The cfg gates are arch-independent so one target
  # per OS is sufficient.
  # ──────────────────────────────────────────────────────────────────
  clippy:
    name: "🧹 Clippy (${{ matrix.os }})"
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    env:
      IS_MUSL_UBUNTU: ${{ matrix.os == 'ubuntu' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos
            runner: macos-latest
            target: aarch64-apple-darwin
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install musl-tools
        if: env.IS_MUSL_UBUNTU == 'true'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy

      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cargo-clippy-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Run cargo clippy
        run: cargo clippy --target=${{ matrix.target }} -- -D warnings

  # ──────────────────────────────────────────────────────────────────
  # Run the test suite on every (os, arch) target. This is the
  # cross-platform correctness gate; `coverage` measures line coverage
  # on Linux only.
  # ──────────────────────────────────────────────────────────────────
  tests:
    name: "🧪 Tests (${{ matrix.os }}-${{ matrix.arch }})"
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    env:
      IS_MUSL_UBUNTU: ${{ (matrix.os == 'ubuntu' && contains(matrix.target, 'musl')) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu
            arch: x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu
            arch: arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
          - os: windows
            arch: x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows
            arch: arm64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
          - os: macos
            arch: x86_64
            runner: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos
            arch: arm64
            runner: macos-latest
            target: aarch64-apple-darwin
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install musl-tools
        if: env.IS_MUSL_UBUNTU == 'true'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cargo-tests-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('Cargo.lock') }}

      - name: Run cargo test
        run: cargo test --target=${{ matrix.target }} --locked

  # ──────────────────────────────────────────────────────────────────
  # Code coverage (Linux/x86_64 only). cargo-llvm-cov re-runs the
  # test suite with LLVM source-based instrumentation to produce
  # lcov.info, which is uploaded to Codecov. The `tests` job above
  # is the cross-platform correctness gate; this job's role is
  # coverage measurement.
  # ──────────────────────────────────────────────────────────────────
  coverage:
    name: "📊 Coverage"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cargo-coverage-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Generate coverage (lcov)
        run: |
          cargo llvm-cov --workspace --all-features --locked \
            --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          flags: implant
          disable_search: true
          fail_ci_if_error: false

  # ──────────────────────────────────────────────────────────────────
  # Build the implant for every (os, arch) target, then stage
  # artifacts for downstream promotion.
  # ──────────────────────────────────────────────────────────────────
  build:
    name: "🔨 Build (${{ matrix.os }}-${{ matrix.arch }})"
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    env:
      IS_MUSL_UBUNTU: ${{ (matrix.os == 'ubuntu' && contains(matrix.target, 'musl')) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu
            arch: x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            jfrog_path: linux/x86_64
          - os: ubuntu
            arch: arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            jfrog_path: linux/arm64
          - os: windows
            arch: x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            jfrog_path: windows/x86_64
          - os: windows
            arch: arm64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            jfrog_path: windows/arm64
          - os: macos
            arch: x86_64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            jfrog_path: macos/x86_64
          - os: macos
            arch: arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            jfrog_path: macos/arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install musl-tools
        if: env.IS_MUSL_UBUNTU == 'true'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cargo-build-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('Cargo.lock') }}

      - name: Build (release)
        run: |
          RUSTFLAGS="-C strip=symbols"
          if [[ "${{ matrix.os }}" == "windows" ]]; then
            RUSTFLAGS="$RUSTFLAGS -C target-feature=+crt-static"
          fi
          export RUSTFLAGS
          cargo build --target=${{ matrix.target }} --release --locked
        shell: bash

      - name: Install cargo cache
        run: |
          if [ -x "$HOME/.cargo/bin/cargo-cache" ] || [ -x "$USERPROFILE\.cargo\bin\cargo-cache.exe" ]; then
            echo "cargo-cache already installed."
          else
            cargo install cargo-cache --locked
          fi
        shell: bash

      - name: Run cargo cache
        run: cargo cache -a -l || true
        shell: bash

      # ──────────────────────────────────────────────────────────────
      # Stage artifacts for downstream promotion.
      #
      # Layout (implant-bin-<os>-<arch>):
      #   <jfrog_path>/openaev-implant[.exe]
      # ──────────────────────────────────────────────────────────────
      - name: Stage binary for upload
        shell: bash
        run: |
          set -euo pipefail
          STAGE="staging/${{ matrix.jfrog_path }}"
          mkdir -p "$STAGE"

          exe_ext=""
          [[ "${{ matrix.os }}" == "windows" ]] && exe_ext=".exe"

          cp "./target/${{ matrix.target }}/release/openaev-implant${exe_ext}" \
             "$STAGE/openaev-implant${exe_ext}"

          ls -la "$STAGE"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: implant-bin-${{ matrix.os }}-${{ matrix.arch }}
          path: staging/
          if-no-files-found: error
          retention-days: 14
